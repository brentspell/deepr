repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-ast
      - id: end-of-file-fixer
        exclude_types: ["svg"]
      - id: trailing-whitespace
        exclude_types: ["svg"]
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        language: system
        entry: ruff check --fix
        types: [python]
      - id: ruff-format
        name: ruff-format
        language: system
        entry: ruff format
        types: [python]
      - id: ty
        name: ty
        language: system
        entry: ty check src tests
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        language: system
        entry: python -m pytest -m "not integration"
        pass_filenames: false
        always_run: true
